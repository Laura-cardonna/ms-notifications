<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta de Clima - KALA Buses</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #FFB6C1;
            color: #000000;
            text-align: center;
            padding: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 30px;
            color: #333333;
        }
        .content h2 {
            color: #FFB6C1;
            font-size: 20px;
        }
        .content p {
            line-height: 1.6;
            font-size: 16px;
        }
        .recomendacion {
            background-color: #f3f3f3;
            border-left: 4px solid #FFB6C1;
            padding: 12px 16px;
            margin-top: 16px;
            border-radius: 4px;
        }
        .footer {
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pronóstico del día</h1>
        </div>
        <div class="content">
            <h2>Planifica tu viaje</h2>
            <p>[PRONOSTICO]</p>
            <div class="recomendacion">
                <p>[RECOMENDACION]</p>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 KALA Buses. Alertas de clima.</p>
            <p>Puedes desactivar estas alertas desde tu perfil en cualquier momento.</p>
        </div>
    </div>
</body>
</html>
